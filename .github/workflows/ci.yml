name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-root

      - name: Create .env file
        run: |
          cat > .env << EOF
          SECRET_KEY=django-insecure-ci-dummy-secret-key-for-testing-only
          DJANGO_SETTINGS_MODULE=config.settings.local
          DB_NAME=test_db
          DB_USER=postgres
          DB_PASSWORD=test_password
          DB_HOST=localhost
          DB_PORT=5432
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Run linters
        run: |
          poetry run ruff check .
          poetry run black --check .

      - name: Run pytest with coverage
        run: |
          poetry run coverage run -m pytest -q
          poetry run coverage report
          poetry run coverage xml

      - name: Check coverage and update badge
        run: poetry run python coverage_cicd.py
        env:
          COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD }}
          GIST_COVERAGE_TOKEN: ${{ secrets.GIT_TOKEN }}
          GIST_COVERAGE_ID: ${{ vars.GIST_COVERAGE_ID }}

  update-badges:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI badge SVG
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            STATUS="passing"
            COLOR="#4c1"
          else
            STATUS="failing"
            COLOR="#e05d44"
          fi

          cat > git-actions.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="206" height="20">
            <title>CI - ${STATUS}</title>
            <defs>
              <linearGradient id="a" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop stop-color="#444D56" offset="0%"/>
                <stop stop-color="#24292E" offset="100%"/>
              </linearGradient>
              <linearGradient id="b" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop stop-color="${COLOR}" offset="0%"/>
                <stop stop-color="${COLOR}" offset="100%"/>
              </linearGradient>
            </defs>
            <g fill="none" fill-rule="evenodd">
              <rect width="146" height="20" rx="3" fill="url(#a)"/>
              <rect x="146" width="60" height="20" rx="3" fill="url(#b)"/>
              <text x="22" y="14" font-family="DejaVu Sans,sans-serif" font-size="11" fill="#fff">GitHub Actions</text>
              <text x="150" y="14" font-family="DejaVu Sans,sans-serif" font-size="11" fill="#fff">${STATUS}</text>
            </g>
          </svg>
          EOF

      - name: Upload CI badge to Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIT_TOKEN }}
          gist_id: ${{ vars.GIST_COVERAGE_ID }}
          file_path: git-actions.svg
          file_type: text
